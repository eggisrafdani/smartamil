<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <title>GANTI JUDUL DI SINI</title> 
    
    <!-- Favicon -->
    <link rel="icon" href="https://placehold.co/64x64?text=✨">

    <style>
        /* Reset CSS agar iframe full layar */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- URL Web App sudah diperbarui -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwbRRdvjrrExkzTPPVy0FNAvn5QM-Xs8I-BN62CgqxFJw3U5K88PZpf4q_c0XSaQkdadg/exec" 
        allow="clipboard-read; clipboard-write"
        title="Money Tracker">
    </iframe>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
        })
        .catch(err => {
          console.log('ServiceWorker gagal didaftarkan: ', err);
        });
    });
  }
</script>
</body>

</html>
