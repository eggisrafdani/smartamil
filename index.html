<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Web Saya</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">

  <style>
    /* CSS agar iframe tampil penuh satu layar (full screen) tanpa garis tepi */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Mencegah munculnya scrollbar ganda */
      background-color: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbwbRRdvjrrExkzTPPVy0FNAvn5QM-Xs8I-BN62CgqxFJw3U5K88PZpf4q_c0XSaQkdadg/exec" allowfullscreen></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Memanggil file sw.js yang satu folder dengan index.html
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker gagal didaftarkan: ', err);
          });
      });
    }
  </script>

</body>
</html>
